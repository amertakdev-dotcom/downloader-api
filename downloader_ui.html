<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #0a0204;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #f0e8ea;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -200px; left: 50%;
    transform: translateX(-50%);
    width: 700px; height: 700px;
    background: radial-gradient(circle, rgba(180,20,40,0.18) 0%, rgba(120,0,20,0.08) 50%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    bottom: -200px; right: -100px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(140,10,30,0.12) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 48px 20px 60px;
  }

  .logo-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 40px;
  }

  .logo-dot {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, #e02040, #7a0015);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
  }

  .logo-dot svg { width: 16px; height: 16px; fill: #fff; }

  .logo-name {
    font-size: 15px;
    font-weight: 600;
    color: #f0e8ea;
    letter-spacing: 0.02em;
  }

  .logo-badge {
    margin-left: auto;
    font-size: 11px;
    color: #c0414f;
    background: rgba(180,20,40,0.15);
    border: 1px solid rgba(180,20,40,0.3);
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.05em;
  }

  h1 {
    font-size: 34px;
    font-weight: 700;
    line-height: 1.2;
    background: linear-gradient(135deg, #fff 0%, #ffc0c8 60%, #e02040 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 10px;
  }

  .subtitle {
    font-size: 14px;
    color: rgba(240,232,234,0.45);
    margin-bottom: 36px;
    line-height: 1.6;
  }

  /* Platform tabs */
  .tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .tab {
    padding: 7px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    border: 1px solid rgba(180,20,40,0.2);
    background: rgba(180,20,40,0.05);
    color: rgba(240,232,234,0.5);
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 6px;
  }

  .tab:hover {
    border-color: rgba(180,20,40,0.4);
    color: rgba(240,232,234,0.8);
    background: rgba(180,20,40,0.1);
  }

  .tab.active {
    background: rgba(180,20,40,0.2);
    border-color: rgba(220,30,50,0.5);
    color: #ff8090;
  }

  .tab-icon { font-size: 14px; }

  /* Input box */
  .input-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(180,20,40,0.2);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 8px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.04);
  }

  .input-label {
    font-size: 12px;
    color: rgba(240,232,234,0.35);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .url-input {
    flex: 1;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(180,20,40,0.25);
    border-radius: 10px;
    padding: 11px 16px;
    font-size: 14px;
    color: #f0e8ea;
    outline: none;
    transition: all 0.2s;
    font-family: inherit;
  }

  .url-input::placeholder { color: rgba(240,232,234,0.2); }

  .url-input:focus {
    border-color: rgba(220,30,50,0.5);
    background: rgba(255,255,255,0.06);
    box-shadow: 0 0 0 3px rgba(180,20,40,0.1);
  }

  .btn-fetch {
    padding: 11px 22px;
    background: linear-gradient(135deg, #c0182e, #8a0018);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    font-family: inherit;
    box-shadow: 0 4px 20px rgba(180,20,40,0.4);
  }

  .btn-fetch:hover {
    background: linear-gradient(135deg, #d41e34, #9a001e);
    box-shadow: 0 4px 28px rgba(180,20,40,0.6);
    transform: translateY(-1px);
  }

  .btn-fetch:active { transform: translateY(0); }

  .btn-fetch:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  /* Loading */
  .loading {
    display: none;
    align-items: center;
    gap: 12px;
    padding: 16px;
    background: rgba(180,20,40,0.07);
    border: 1px solid rgba(180,20,40,0.15);
    border-radius: 10px;
    margin-bottom: 16px;
    font-size: 13px;
    color: rgba(240,232,234,0.6);
  }

  .loading.show { display: flex; }

  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(180,20,40,0.2);
    border-top-color: #e02040;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Error */
  .error-box {
    display: none;
    padding: 14px 16px;
    background: rgba(180,20,40,0.1);
    border: 1px solid rgba(180,20,40,0.3);
    border-radius: 10px;
    margin-bottom: 16px;
    font-size: 13px;
    color: #ff7080;
    line-height: 1.5;
  }

  .error-box.show { display: block; }

  /* Result card */
  .result-card {
    display: none;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(180,20,40,0.2);
    border-radius: 16px;
    overflow: hidden;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 8px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.04);
  }

  .result-card.show { display: block; }

  .result-header {
    display: flex;
    gap: 16px;
    padding: 20px;
    border-bottom: 1px solid rgba(180,20,40,0.1);
    align-items: flex-start;
  }

  .thumb-wrap {
    position: relative;
    flex-shrink: 0;
    width: 110px; height: 70px;
    border-radius: 8px;
    overflow: hidden;
    background: rgba(180,20,40,0.1);
  }

  .thumb-wrap img {
    width: 100%; height: 100%;
    object-fit: cover;
  }

  .platform-pill {
    position: absolute;
    top: 5px; left: 5px;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 10px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .pill-youtube  { background: #ff0000; color: #fff; }
  .pill-tiktok   { background: #000; color: #fff; }
  .pill-pinterest{ background: #e60023; color: #fff; }
  .pill-spotify  { background: #1db954; color: #000; }

  .result-meta { flex: 1; min-width: 0; }

  .result-title {
    font-size: 15px;
    font-weight: 600;
    color: #f0e8ea;
    line-height: 1.4;
    margin-bottom: 6px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .result-author {
    font-size: 12px;
    color: rgba(240,232,234,0.4);
    margin-bottom: 6px;
  }

  .meta-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }

  .chip {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 6px;
    background: rgba(180,20,40,0.15);
    color: #ff8090;
    border: 1px solid rgba(180,20,40,0.2);
  }

  /* Download section */
  .dl-section {
    padding: 16px 20px;
  }

  .dl-section-title {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(240,232,234,0.3);
    margin-bottom: 12px;
  }

  .dl-options {
    display: grid;
    gap: 8px;
  }

  .dl-item {
    display: flex;
    align-items: center;
    padding: 12px 14px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px;
    gap: 12px;
    transition: all 0.2s;
  }

  .dl-item:hover {
    background: rgba(180,20,40,0.08);
    border-color: rgba(180,20,40,0.2);
  }

  .dl-icon {
    width: 34px; height: 34px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 16px;
  }

  .dl-icon.video  { background: rgba(180,20,40,0.2); }
  .dl-icon.audio  { background: rgba(30,185,84,0.15); }
  .dl-icon.image  { background: rgba(100,120,255,0.15); }
  .dl-icon.music  { background: rgba(30,185,84,0.15); }

  .dl-info { flex: 1; min-width: 0; }

  .dl-label {
    font-size: 13px;
    font-weight: 500;
    color: rgba(240,232,234,0.85);
  }

  .dl-sub {
    font-size: 11px;
    color: rgba(240,232,234,0.3);
    margin-top: 2px;
  }

  .btn-dl {
    padding: 7px 16px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.18s;
    text-decoration: none;
    font-family: inherit;
    display: inline-block;
    border: 1px solid rgba(220,30,50,0.35);
    background: rgba(180,20,40,0.15);
    color: #ff8090;
    white-space: nowrap;
  }

  .btn-dl:hover {
    background: rgba(180,20,40,0.3);
    border-color: rgba(220,30,50,0.6);
    color: #ffb0bc;
  }

  /* Image grid */
  .img-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
    gap: 8px;
    padding: 12px 20px;
    border-top: 1px solid rgba(180,20,40,0.1);
  }

  .img-thumb {
    aspect-ratio: 1;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid rgba(180,20,40,0.15);
    background: rgba(180,20,40,0.08);
  }

  .img-thumb img {
    width: 100%; height: 100%;
    object-fit: cover;
    cursor: pointer;
    transition: transform 0.2s;
  }

  .img-thumb img:hover { transform: scale(1.05); }

  /* Spotify embed */
  .spotify-embed {
    padding: 0 20px 20px;
  }

  .spotify-embed iframe {
    border-radius: 12px;
    width: 100%;
    border: 0;
  }

  /* Format selector (YouTube) */
  .fmt-select {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(180,20,40,0.25);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 12px;
    color: rgba(240,232,234,0.7);
    outline: none;
    font-family: inherit;
    cursor: pointer;
    margin-right: 8px;
  }

  .fmt-select option { background: #1a0408; }

  /* Divider */
  .divider {
    height: 1px;
    background: rgba(180,20,40,0.1);
    margin: 0;
  }

  /* No result note */
  .no-dl {
    padding: 16px 20px;
    font-size: 13px;
    color: rgba(240,232,234,0.3);
    text-align: center;
  }

  .powered {
    text-align: center;
    margin-top: 32px;
    font-size: 11px;
    color: rgba(240,232,234,0.15);
  }

  .powered span { color: rgba(180,20,40,0.5); }
</style>
</head>
<body>
<div class="wrapper">

  <div class="logo-bar">
    <div class="logo-dot">
      <svg viewBox="0 0 24 24"><path d="M12 2L4 6v6c0 5 3.7 9.7 8 11 4.3-1.3 8-6 8-11V6z"/></svg>
    </div>
    <span class="logo-name">Amertak Downloader</span>
    <span class="logo-badge">API v1</span>
  </div>

  <h1>Download anything<br>in seconds</h1>
  <p class="subtitle">YouTube · TikTok · Pinterest · Spotify — paste link, get file</p>

  <div class="tabs">
    <button class="tab active" data-platform="auto" onclick="setTab(this,'auto')">
      <span class="tab-icon">🌐</span> Auto-detect
    </button>
    <button class="tab" data-platform="youtube" onclick="setTab(this,'youtube')">
      <span class="tab-icon">▶</span> YouTube
    </button>
    <button class="tab" data-platform="tiktok" onclick="setTab(this,'tiktok')">
      <span class="tab-icon">♪</span> TikTok
    </button>
    <button class="tab" data-platform="pinterest" onclick="setTab(this,'pinterest')">
      <span class="tab-icon">📌</span> Pinterest
    </button>
    <button class="tab" data-platform="spotify" onclick="setTab(this,'spotify')">
      <span class="tab-icon">🎵</span> Spotify
    </button>
  </div>

  <div class="input-card">
    <div class="input-label">Paste URL</div>
    <div class="input-row">
      <input
        class="url-input"
        id="urlInput"
        type="url"
        placeholder="https://..."
        autocomplete="off"
        spellcheck="false"
        onkeydown="if(event.key==='Enter')fetchData()"
      />
      <button class="btn-fetch" id="fetchBtn" onclick="fetchData()">Download</button>
    </div>
  </div>

  <div class="loading" id="loadingBox">
    <div class="spinner"></div>
    <span id="loadingText">Fetching data...</span>
  </div>

  <div class="error-box" id="errorBox"></div>

  <div class="result-card" id="resultCard">
    <div class="result-header" id="resultHeader"></div>
    <div class="divider" id="divider1"></div>
    <div class="dl-section" id="dlSection"></div>
    <div id="extraSection"></div>
  </div>

  <p class="powered">Powered by <span>downloader.onrender.com</span> · Amertak Network</p>
</div>

<script>
const BASE = 'https://transcribt-api-pro.onrender.com';
let currentPlatform = 'auto';

function setTab(el, platform) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  currentPlatform = platform;
  const input = document.getElementById('urlInput');
  const placeholders = {
    auto: 'https://...',
    youtube: 'https://youtu.be/...',
    tiktok: 'https://vm.tiktok.com/...',
    pinterest: 'https://pin.it/...',
    spotify: 'https://open.spotify.com/track/...'
  };
  input.placeholder = placeholders[platform] || 'https://...';
}

function show(id, cls='show') { document.getElementById(id).classList.add(cls); }
function hide(id, cls='show') { document.getElementById(id).classList.remove(cls); }

function setLoading(on, msg='Fetching data...') {
  document.getElementById('loadingText').textContent = msg;
  document.getElementById('loadingBox').classList.toggle('show', on);
  document.getElementById('fetchBtn').disabled = on;
}

function showError(msg) {
  const el = document.getElementById('errorBox');
  el.textContent = msg;
  el.classList.add('show');
}

function clearResults() {
  hide('errorBox');
  hide('resultCard');
  document.getElementById('resultHeader').innerHTML = '';
  document.getElementById('dlSection').innerHTML = '';
  document.getElementById('extraSection').innerHTML = '';
  document.getElementById('divider1').style.display = '';
}

async function fetchData() {
  const url = document.getElementById('urlInput').value.trim();
  if (!url) { showError('Please paste a URL first.'); return; }

  clearResults();
  setLoading(true, 'Contacting server...');

  try {
    const endpoint = currentPlatform === 'auto'
      ? `${BASE}/api/info?url=${encodeURIComponent(url)}`
      : `${BASE}/api/${currentPlatform}?url=${encodeURIComponent(url)}`;

    setLoading(true, 'Downloading metadata...');
    const res = await fetch(endpoint);
    const json = await res.json();
    setLoading(false);

    if (!json.success || !json.data) {
      showError(json.error || 'Could not fetch data. Check the URL and try again.');
      return;
    }

    renderResult(json);
  } catch (e) {
    setLoading(false);
    showError('Network error: ' + e.message + '. Make sure downloader.onrender.com is running.');
  }
}

function renderResult(json) {
  const d = json.data;
  const platform = json.platform || json.detectedPlatform || 'unknown';
  const card = document.getElementById('resultCard');

  // ── Header ──────────────────────────────────────────────────────────────
  const thumb = d.thumbnail || d.thumbnailHD || '';
  const title = d.title || 'Untitled';
  const author = d.author?.name || d.artist || '';
  const duration = d.durationFormatted || (d.duration ? fmtSec(d.duration) : '');
  const type = d.type || 'video';

  const pillClass = { youtube:'pill-youtube', tiktok:'pill-tiktok', pinterest:'pill-pinterest', spotify:'pill-spotify' }[platform] || '';

  let chips = '';
  if (duration) chips += `<span class="chip">⏱ ${duration}</span>`;
  if (d.viewCount) chips += `<span class="chip">👁 ${fmtNum(d.viewCount)}</span>`;
  if (d.playCount) chips += `<span class="chip">▶ ${fmtNum(d.playCount)}</span>`;
  if (d.likeCount) chips += `<span class="chip">❤ ${fmtNum(d.likeCount)}</span>`;
  if (type === 'image') chips += `<span class="chip">🖼 Image</span>`;

  document.getElementById('resultHeader').innerHTML = `
    <div class="thumb-wrap">
      ${thumb ? `<img src="${thumb}" alt="thumbnail" onerror="this.style.display='none'"/>` : ''}
      <span class="platform-pill ${pillClass}">${platform}</span>
    </div>
    <div class="result-meta">
      <div class="result-title">${esc(title)}</div>
      ${author ? `<div class="result-author">by ${esc(author)}</div>` : ''}
      <div class="meta-chips">${chips}</div>
    </div>
  `;

  // ── Download options ───────────────────────────────────────────────────
  let dlHTML = `<div class="dl-section-title">Download</div><div class="dl-options">`;
  let hasAny = false;

  const safeTitle = (title || 'download').replace(/[\\/:*?"<>|]+/g, '_').slice(0, 60);

  if (platform === 'youtube') {
    const best = d.bestDownload;
    if (best?.video?.url) {
      const fmts = (d.formats?.video || []).filter(f=>f.url).slice(0,6);
      const opts = fmts.map(f=>`<option value="${esc(f.url)}" data-ext="${esc(f.container||'mp4')}">${esc(f.quality)} — ${f.fileSizeMB||'?'}MB</option>`).join('');
      dlHTML += dlRow('video','▶','Video (MP4)',
        `Select quality`,
        `<select class="fmt-select" id="ytVideoSel">${opts}</select>
         <button type="button" class="btn-dl" onclick="downloadFromSelect('ytVideoSel','${escJs(safeTitle)}', this)">Download</button>`
      );
      hasAny = true;
    }
    if (best?.audio?.url) {
      const afmts = (d.formats?.audio || []).filter(f=>f.url).slice(0,4);
      const aopts = afmts.map(f=>`<option value="${esc(f.url)}" data-ext="${esc(f.container||'m4a')}">${esc(f.quality||'Audio')} — ${f.fileSizeMB||'?'}MB</option>`).join('');
      dlHTML += dlRow('audio','🎵','Audio only',
        `Best available format`,
        `<select class="fmt-select" id="ytAudioSel">${aopts}</select>
         <button type="button" class="btn-dl" onclick="downloadFromSelect('ytAudioSel','${escJs(safeTitle)}', this)">Download</button>`
      );
      hasAny = true;
    }
  }

  if (platform === 'tiktok') {
    const dl = d.downloads;
    if (dl?.noWatermark) {
      dlHTML += dlRow('video','▶','No watermark', 'MP4 HD', dlBtn(dl.noWatermark, safeTitle, 'mp4'));
      hasAny = true;
    }
    if (dl?.hdNoWatermark) {
      dlHTML += dlRow('video','⭐','HD No watermark', 'Highest quality', dlBtn(dl.hdNoWatermark, safeTitle + '_hd', 'mp4'));
    }
    if (dl?.withWatermark) {
      dlHTML += dlRow('video','💧','With watermark', 'Original', dlBtn(dl.withWatermark, safeTitle + '_wm', 'mp4'));
    }
    if (dl?.audio) {
      dlHTML += dlRow('audio','🎵','Audio / Music', 'MP3', dlBtn(dl.audio, safeTitle, 'mp3'));
    }
  }

  if (platform === 'pinterest') {
    const dl = d.downloads;
    if (dl?.video) {
      dlHTML += dlRow('video','▶','Video', 'MP4', dlBtn(dl.video, safeTitle, 'mp4'));
      hasAny = true;
    }
    if (dl?.imageOriginal) {
      dlHTML += dlRow('image','🖼','Image (Original)', 'Highest quality', dlBtn(dl.imageOriginal, safeTitle, 'jpg'));
      hasAny = true;
    } else if (dl?.image) {
      dlHTML += dlRow('image','🖼','Image', 'Pinterest', dlBtn(dl.image, safeTitle, 'jpg'));
      hasAny = true;
    }
  }

  if (platform === 'spotify') {
    const dl = d.downloads;
    if (dl?.mp3?.url) {
      const mp3Ext = dl.mp3.format || 'mp3';
      dlHTML += dlRow('audio','🎵',`Audio — ${dl.mp3.quality||''}`,`via ${dl.mp3.source||'spotifydown'}`, dlBtn(dl.mp3.url, safeTitle, mp3Ext));
      hasAny = true;
    }
    if (dl?.preview?.url) {
      dlHTML += dlRow('audio','🔊','30s Preview', 'Spotify preview', dlBtn(dl.preview.url, safeTitle + '_preview', 'mp3'));
      hasAny = true;
    }
    if (dl?.youtubeMatch) {
      // This opens the YouTube page itself (not a file), so a new tab is
      // correct here — it isn't a direct downloadable file.
      dlHTML += dlRow('video','▶','YouTube Match', dl.youtubeMatch.note||'Via YouTube', `<a class="btn-dl" href="${esc(dl.youtubeMatch.youtubeUrl)}" target="_blank" rel="noreferrer">Open</a>`);
      hasAny = true;
    }
  }

  if (!hasAny) {
    dlHTML += `</div>`;
    document.getElementById('dlSection').innerHTML = `<div class="no-dl">No direct download links found. Try another URL.</div>`;
  } else {
    dlHTML += `</div>`;
    document.getElementById('dlSection').innerHTML = dlHTML;
  }

  // ── Extra: TikTok images / Spotify embed ──────────────────────────────
  let extra = '';

  if (platform === 'tiktok' && d.downloads?.images?.length > 0) {
    extra += `<div class="divider"></div><div class="img-grid">`;
    d.downloads.images.forEach(img => {
      extra += `<div class="img-thumb"><img src="${esc(img.url)}" loading="lazy" onclick="window.open('${esc(img.url)}','_blank')" title="Click to open" /></div>`;
    });
    extra += `</div>`;
  }

  if (platform === 'pinterest' && d.downloads?.images?.length > 0) {
    extra += `<div class="divider"></div><div class="img-grid">`;
    d.downloads.images.forEach(img => {
      extra += `<div class="img-thumb"><img src="${esc(img.url)}" loading="lazy" onclick="window.open('${esc(img.url)}','_blank')" /></div>`;
    });
    extra += `</div>`;
  }

  if (platform === 'spotify' && d.embedUrl) {
    const embedH = d.type === 'album' || d.type === 'playlist' ? 352 : 152;
    extra += `<div class="divider"></div><div class="spotify-embed">
      <iframe src="${esc(d.embedUrl)}" height="${embedH}" allowfullscreen allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
    </div>`;
  }

  document.getElementById('extraSection').innerHTML = extra;

  card.classList.add('show');
}

function dlRow(type, icon, label, sub, actionHTML) {
  return `<div class="dl-item">
    <div class="dl-icon ${type}">${icon}</div>
    <div class="dl-info">
      <div class="dl-label">${label}</div>
      <div class="dl-sub">${sub}</div>
    </div>
    ${actionHTML}
  </div>`;
}

// Streams the file through our own backend (Content-Disposition: attachment).
// IMPORTANT: this uses a hidden <iframe>, NOT an <a> click/window.open/
// location change. An <a> click without target is still a real top-level
// navigation of the page — if the proxy ever returns an error instead of
// the file, the whole page navigates to the API URL ("redirect"). Loading
// the URL inside a hidden iframe means the request happens completely
// off-screen: the visible page never navigates, and the browser's native
// download manager still picks up the response because of the
// Content-Disposition header.
// Streams the file through our own backend and downloads it via a Blob.
// This is the most reliable cross-browser method:
//  - fetch() + blob keeps everything inside this page — no navigation, no
//    new tab, ever (even if the backend returns an error).
//  - a blob: URL is always same-origin, so the `download` attribute is
//    always honored (unlike a direct link to the cross-origin API, which
//    browsers are allowed to ignore `download` on).
//  - errors are caught and shown as a toast instead of ever touching the
//    visible page.
function dlBtn(url, filename, ext) {
  return `<button type="button" class="btn-dl" onclick="triggerDownload('${escJs(url)}','${escJs(filename)}','${escJs(ext||'')}', this)">Download</button>`;
}

function downloadFromSelect(selId, filename, btnEl) {
  const sel = document.getElementById(selId);
  if (!sel || !sel.value) return;
  const ext = sel.selectedOptions[0]?.dataset?.ext || '';
  triggerDownload(sel.value, filename, ext, btnEl);
}

async function triggerDownload(fileUrl, filename, ext, btnEl) {
  if (!fileUrl) return;
  const proxyUrl = `${BASE}/api/proxy-download?url=${encodeURIComponent(fileUrl)}`
    + `&filename=${encodeURIComponent(filename || 'download')}`
    + (ext ? `&ext=${encodeURIComponent(ext)}` : '');

  const originalLabel = btnEl ? btnEl.textContent : null;
  if (btnEl) { btnEl.disabled = true; btnEl.textContent = 'កំពុងទាញយក...'; }
  showDownloadToast('កំពុងទាញយក... / Downloading...');

  try {
    const res = await fetch(proxyUrl);
    if (!res.ok) {
      let msg = 'ទាញយកមិនបាន — សូមព្យាយាមម្តងទៀត។';
      try {
        const j = await res.json();
        if (j?.error) msg = j.error;
      } catch {}
      showDownloadToast(msg);
      return;
    }

    const blob = await res.blob();
    const finalName = (filename || 'download') + (ext && !filename?.toLowerCase().endsWith('.' + ext.toLowerCase()) ? '.' + ext : '');
    const blobUrl = URL.createObjectURL(blob);

    const a = document.createElement('a');
    a.href = blobUrl;
    a.download = finalName;
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(blobUrl), 30000);

    showDownloadToast('ទាញយកបានជោគជ័យ! / Downloaded!');
  } catch (e) {
    console.error('[download] failed:', e);
    showDownloadToast('បញ្ហាបណ្តាញ — សូមព្យាយាមម្តងទៀត។');
  } finally {
    if (btnEl) { btnEl.disabled = false; btnEl.textContent = originalLabel; }
  }
}

// Small non-blocking toast so the person gets feedback without any page
// navigation or modal.
function showDownloadToast(msg) {
  let toast = document.getElementById('dlToast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'dlToast';
    toast.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);'
      + 'background:rgba(180,20,40,0.95);color:#fff;padding:10px 18px;border-radius:20px;'
      + 'font-size:13px;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,0.4);'
      + 'transition:opacity 0.3s;pointer-events:none;max-width:80vw;text-align:center;';
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.style.opacity = '1';
  clearTimeout(toast._hideTimer);
  toast._hideTimer = setTimeout(() => { toast.style.opacity = '0'; }, 3000);
}

// Escapes a string for safe embedding inside a single-quoted HTML attribute
// that itself contains inline JS (onclick="...('...')").
function escJs(s) {
  return String(s || '')
    .replace(/\\/g, '\\\\')
    .replace(/'/g, "\\'")
    .replace(/"/g, '&quot;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function fmtSec(s) {
  s = parseInt(s) || 0;
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
  if (h) return `${h}:${pad(m)}:${pad(sec)}`;
  return `${m}:${pad(sec)}`;
}

function pad(n) { return String(n).padStart(2,'0'); }

function fmtNum(n) {
  n = parseInt(n) || 0;
  if (n >= 1e9) return (n/1e9).toFixed(1)+'B';
  if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
  if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
  return String(n);
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
