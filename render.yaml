services:
  - type: web
    name: amertak-downloader-api
    env: node
    region: singapore
    plan: free
    buildCommand: npm install
    startCommand: node src/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: RATE_LIMIT_MAX
        value: 30
      - key: RATE_LIMIT_WINDOW_MS
        value: 60000
